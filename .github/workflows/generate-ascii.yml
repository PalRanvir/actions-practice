name: Generate ASCII Artwork
on:
  push:
jobs:
    ascii-job:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout repository
          uses: actions/checkout@v6
        
        - name: Install Cowsay CLI tool
          run: sudo apt update -y && sudo apt install -y cowsay

        - name: Execute Cowsay
          run: cowsay -f dragon "Run for cover, I am a DRAGON....RAWR" >> lion.txt"

        - name: List Repository Files
          run: ls -ltra

        - name: Verify Output
          run: grep -i 'dragon' lion.txt

        - name: Display Artwork
          run: cat lion.txt

        