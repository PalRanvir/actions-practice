name: Run ASCII Script
on:
  push:
    branches: [main]
jobs:
    ascii-job:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout repository
          uses: actions/checkout@v6
        
        - name: List Files Before Run
          run: ls -ltra

        - name: Make Script Executable and Run
          run: |
            chmod +x ascii-script.sh
            ./ascii-script.sh